name: Ship Sticks E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run tests daily at 9 AM UTC (staging environment check)
    - cron: '0 9 * * 1-5'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create reports directory
        run: mkdir -p reports/failures reports/logs

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://app.staging.shipsticks.com' }}
          HEADED: false
          TIMEOUT: 45000
          CI: true
        run: npx playwright test

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            let resultComment = '## 🧪 E2E Test Results\n\n';
            resultComment += `**Runner:** Playwright Test\n`;
            resultComment += `\n**Commit:** ${context.payload.head?.sha?.substring(0, 7)}\n`;
            resultComment += `**Environment:** Ship Sticks Staging\n`;
            resultComment += `**Timestamp:** ${new Date().toISOString()}\n\n`;
            
            if ('${{ job.status }}' !== 'success') {
              resultComment += '❌ Some tests failed. Check the uploaded artifacts for detailed failure analysis.\n';
              resultComment += '📊 Artifacts include screenshots, console logs, network errors, and HTML snapshots.';
            } else {
              resultComment += '✅ All tests passed successfully!';
            }
                
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: resultComment
            });

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit
        run: npm audit --audit-level=moderate
